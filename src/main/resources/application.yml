spring:
  application:
    name: flowdesk

  datasource:
    url: jdbc:postgresql://localhost:5433/flowdesk # IMPORTANT: use port 5433 because 5432 conflicts with local PostgreSQL
    username: flowdesk_user
    password: flowdesk_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
